<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>院前 EKG 通報</title>
    <style>
      :root {
        font-family: "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
      }

      body {
        align-items: center;
        background: #f5f7f9;
        color: #17212b;
        display: grid;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
      }

      main {
        background: white;
        border: 1px solid #d7e0e8;
        border-radius: 8px;
        box-shadow: 0 12px 32px rgba(28, 42, 55, 0.1);
        display: grid;
        gap: 12px;
        margin: auto;
        max-width: 420px;
        padding: 24px;
        text-align: center;
      }

      a {
        background: #0d766e;
        border-radius: 6px;
        color: white;
        display: inline-block;
        padding: 12px 16px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>院前 EKG 通報</h1>
      <p>正在開啟測試系統...</p>
      <a href="https://prehospital-critical-alert-test.onrender.com">開啟系統</a>
    </main>
    <script>
      window.location.replace("https://prehospital-critical-alert-test.onrender.com");
    </script>
  </body>
</html>
